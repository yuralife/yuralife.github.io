<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yuralife</title>
	<meta name="description" content="personal profile of yuralife — artist, developer and music maker" />
	<meta name="author" content="yuralife" />
	<meta name="keywords" content="yuralife, music, artist, profile, social links" />
	<meta property="og:title" content="yuralife — personal page" />
	<meta property="og:description" content="personal profile of yuralife with links to socials and music platforms" />
	<meta property="og:type" content="website" />
	<meta property="og:site_name" content="yuralife" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #000000 0%, #0a0a2e 40%, #1a1a4e 70%, #3d0a4e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .bubble:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.2);
        }

        .bubble img {
            width: 50%;
            height: 50%;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }
    </style>
</head>
<body>
    <script>
        const links = [
            { url: 'https://instagram.com/yuralife', icon: 'assets/instagram.svg' },
            { url: 'https://www.youtube.com/channel/UC8cgVMqrcX7hgJ7StC5Iz1Q', icon: 'assets/youtube.svg' },
            { url: 'https://tiktok.com/@yuralife_', icon: 'assets/tiktok.svg' },
            { url: 'https://music.apple.com/ua/artist/yuralife/1816398526?l=uk', icon: 'assets/applemusic.svg' },
            { url: 'https://open.spotify.com/artist/3rqSG9WSu6MfNRpaCE7eFO', icon: 'assets/spotify.svg' },
            { url: 'https://linktr.ee/adafpv', icon: 'assets/ukraine.svg' }
        ];

        class Bubble {
            constructor(x, y, link) {
                this.radius = 60 + Math.random() * 40;
                this.x = x || Math.random() * (window.innerWidth - this.radius * 2) + this.radius;
                this.y = y || Math.random() * (window.innerHeight - this.radius * 2) + this.radius;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.link = link;
                this.hovered = false;
                this.normalSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                
                this.element = document.createElement('div');
                this.element.className = 'bubble';
                this.element.style.width = this.radius * 2 + 'px';
                this.element.style.height = this.radius * 2 + 'px';
                
                const img = document.createElement('img');
                img.src = link.icon;
                this.element.appendChild(img);
                
                this.element.addEventListener('mouseenter', () => {
                    this.hovered = true;
                });
                
                this.element.addEventListener('mouseleave', () => {
                    this.hovered = false;
                });
                
                this.element.addEventListener('click', () => {
                    window.open(link.url, '_blank');
                });
                
                document.body.appendChild(this.element);
                this.updatePosition();
            }

            updatePosition() {
                this.element.style.left = (this.x - this.radius) + 'px';
                this.element.style.top = (this.y - this.radius) + 'px';
            }

            update(bubbles) {
                if (this.hovered) {
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                } else {
                    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (speed < this.normalSpeed) {
                        const factor = 1.05;
                        this.vx *= factor;
                        this.vy *= factor;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -1;
                } else if (this.x + this.radius > window.innerWidth) {
                    this.x = window.innerWidth - this.radius;
                    this.vx *= -1;
                }

                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -1;
                } else if (this.y + this.radius > window.innerHeight) {
                    this.y = window.innerHeight - this.radius;
                    this.vy *= -1;
                }

                for (let other of bubbles) {
                    if (other === this) continue;
                    
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const minDist = this.radius + other.radius;

                    if (distance < minDist) {
                        const angle = Math.atan2(dy, dx);
                        const targetX = this.x + Math.cos(angle) * minDist;
                        const targetY = this.y + Math.sin(angle) * minDist;
                        
                        const ax = (targetX - other.x) * 0.05;
                        const ay = (targetY - other.y) * 0.05;
                        
                        this.vx -= ax;
                        this.vy -= ay;
                        other.vx += ax;
                        other.vy += ay;

                        const overlap = minDist - distance;
                        const separateX = (dx / distance) * overlap * 0.5;
                        const separateY = (dy / distance) * overlap * 0.5;
                        
                        this.x -= separateX;
                        this.y -= separateY;
                        other.x += separateX;
                        other.y += separateY;
                    }
                }

                this.updatePosition();
            }
        }

        const bubbles = [];
        links.forEach(link => {
            bubbles.push(new Bubble(null, null, link));
        });

        function animate() {
            bubbles.forEach(bubble => bubble.update(bubbles));
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            bubbles.forEach(bubble => {
                if (bubble.x + bubble.radius > window.innerWidth) {
                    bubble.x = window.innerWidth - bubble.radius;
                }
                if (bubble.y + bubble.radius > window.innerHeight) {
                    bubble.y = window.innerHeight - bubble.radius;
                }
                bubble.updatePosition();
            });
        });
    </script>
</body>
</html>
