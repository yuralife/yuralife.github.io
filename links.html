<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JB URLs</title>
    <script>
        function generateURL() {
            const input = document.getElementById("hostInput").value;
            const url = `jbapp://junkbusters.test?host=${encodeURIComponent(input)}`;
            const result = document.getElementById("result");
            result.innerHTML = `<a href="${url}">${url}</a>`;
        }
    </script>
</head>
<body>
    <h1>JB URLs</h1>
	<a href="jbapp://junkbusters.test?host=staging">jbapp://junkbusters.test?host=staging</a>
	<br>
	<br>
	<a href="jbapp://junkbusters.test?host=production">jbapp://junkbusters.test?host=production</a>
	<br>
	<br>
    <label for="hostInput">Enter Host:</label>
    <input type="text" id="hostInput" placeholder="Enter host">
    <button onclick="generateURL()">Generate</button>
    <div id="result"></div>
</body>
</html>
